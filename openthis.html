<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://i.ibb.co; media-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
<title>HABURDAY!</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'Georgia', serif;
  background-image: url('bg.png');
  background-size: cover; background-position: center; background-repeat: no-repeat;
  position: relative; touch-action: manipulation;
}
#scene1, #scene2 {
  position: absolute; inset: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s ease;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
#scene2 { opacity: 0; pointer-events: none; overflow-y: auto; overflow-x: hidden; padding: 16px; -webkit-overflow-scrolling: touch; }
#scene2.active { opacity: 1; pointer-events: all; }
#scene1.hidden { opacity: 0; pointer-events: none; }
.title1 {
  font-size: clamp(32px, 8vw, 80px); font-weight: 900; color: #FFF5A0;
  text-shadow: 4px 4px 0 #E8956D, 6px 6px 0 #D4537E; letter-spacing: 4px;
  font-family: 'Impact', 'Arial Black', sans-serif; text-align: center;
  margin-bottom: clamp(20px, 5vh, 40px); animation: titleBounce 1s ease infinite alternate;
  line-height: 1.1; padding: 0 10px;
}
@keyframes titleBounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }
.gift-wrapper { cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: clamp(10px, 3vh, 20px); -webkit-tap-highlight-color: transparent; user-select: none; }
#giftBox { font-size: clamp(70px, 20vw, 160px); display: block; animation: giftPulse 1.2s ease-in-out infinite; transform-origin: center bottom; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.25)); line-height: 1; }
@keyframes giftPulse {
  0%   { transform: scale(1)    rotate(-2deg); }
  25%  { transform: scale(1.12) rotate(2deg); }
  50%  { transform: scale(1.18) rotate(-1deg); }
  75%  { transform: scale(1.12) rotate(1deg); }
  100% { transform: scale(1)    rotate(-2deg); }
}
#giftBox.exploding { animation: giftExplode 0.6s ease forwards; }
@keyframes giftExplode {
  0%   { transform: scale(1);   opacity: 1; }
  30%  { transform: scale(1.5)  rotate(15deg);  opacity: 1; }
  60%  { transform: scale(2)    rotate(-10deg); opacity: 0.5; }
  100% { transform: scale(0.1)  rotate(30deg);  opacity: 0; }
}
.click-hint { font-size: clamp(14px, 3vw, 26px); color: #3a1a4a; font-family: 'Courier New', monospace; font-style: italic; font-weight: bold; text-shadow: 1px 1px 0 rgba(255,255,255,0.5); animation: hintFade 1.5s ease-in-out infinite alternate; text-align: center; }
@keyframes hintFade { from { opacity: 0.6; transform: translateY(0); } to { opacity: 1; transform: translateY(-4px); } }
#confettiCanvas, #balloonCanvas { position: absolute; inset: 0; pointer-events: none; width: 100%; height: 100%; }
#confettiCanvas { z-index: 100; } #balloonCanvas { z-index: 50; }
.title2 { font-size: clamp(24px, 6vw, 70px); font-weight: 900; color: #FFF5A0; text-shadow: 4px 4px 0 #E8956D, 6px 6px 0 #D4537E; letter-spacing: 3px; font-family: 'Impact', 'Arial Black', sans-serif; text-align: center; margin-bottom: 8px; animation: titleBounce 1s ease infinite alternate; line-height: 1.1; padding: 0 10px; }
.scene2-content { display: flex; flex-direction: column; align-items: center; gap: clamp(10px, 2vh, 20px); width: 100%; max-width: 1000px; position: relative; z-index: 10; }
.person-img { width: clamp(80px, 18vw, 150px); height: auto; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3)); animation: floatUp 2s ease-in-out infinite alternate; display: block; }
.roblox-img { width: clamp(60px, 14vw, 100px); height: auto; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3)); animation: floatUp 2s ease-in-out infinite alternate; display: block; }
@keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-14px); } }
.username-tag { font-size: clamp(10px, 1.5vw, 13px); color: rgba(255,255,255,1); opacity: 0.1; font-family: 'Courier New', monospace; letter-spacing: 1px; margin-top: -6px; text-align: right; align-self: flex-end; padding-right: 4px; }
.gifts-row { display: flex; align-items: center; gap: clamp(12px, 3vw, 30px); flex-wrap: wrap; justify-content: center; width: 100%; }
.meme-box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.meme-img { width: clamp(80px, 16vw, 200px); height: auto; border: 3px solid rgba(255,255,255,0.4); border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); display: block; }
.meme-gif { width: clamp(80px, 16vw, 170px); height: auto; border: 3px solid rgba(255,255,255,0.4); border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); display: block; }
.gifts-text { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; max-width: 420px; min-width: 0; }
.gift-line1 { font-size: clamp(18px, 4vw, 56px); font-weight: 900; color: #7B5BB8; font-family: 'Impact', 'Arial Black', sans-serif; text-shadow: 2px 2px 0 rgba(255,255,255,0.6); line-height: 1.1; text-transform: uppercase; letter-spacing: 2px; }
.gift-line2 { font-size: clamp(28px, 6vw, 80px); font-weight: 900; color: #FFF5A0; font-family: 'Impact', 'Arial Black', sans-serif; text-shadow: 3px 3px 0 #E8956D, 5px 5px 0 #D4537E; line-height: 1; animation: numberPop 0.8s ease-in-out infinite alternate; }
@keyframes numberPop { from { transform: scale(1); } to { transform: scale(1.05); } }
.gift-line3 { font-size: clamp(16px, 3vw, 38px); font-weight: 700; color: #FFF5A0; font-family: 'Georgia', serif; text-shadow: 2px 2px 0 #D4537E; }
.balloon-deco { position: absolute; font-size: clamp(24px, 5vw, 60px); pointer-events: none; z-index: 5; animation: balDeco 3s ease-in-out infinite alternate; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); line-height: 1; }
@keyframes balDeco { from { transform: rotate(-8deg) translateY(0); } to { transform: rotate(8deg) translateY(-12px); } }
.bal-l1 { top: 5%;  left: 2%;  animation-delay: 0s; }
.bal-l2 { top: 25%; left: 0%;  animation-delay: 0.4s; }
.bal-l3 { top: 50%; left: 1%;  animation-delay: 0.8s; }
.bal-l4 { top: 70%; left: 3%;  animation-delay: 1.2s; }
.bal-l5 { top: 15%; left: 8%;  animation-delay: 0.6s; }
.bal-r1 { top: 5%;  right: 2%; animation-delay: 0.3s; }
.bal-r2 { top: 25%; right: 0%; animation-delay: 0.7s; }
.bal-r3 { top: 50%; right: 1%; animation-delay: 1.1s; }
.bal-r4 { top: 70%; right: 3%; animation-delay: 1.5s; }
.bal-r5 { top: 15%; right: 8%; animation-delay: 0.9s; }
#songNote { font-size: clamp(22px, 5vw, 36px); cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; animation: noteBounce 0.8s ease-in-out infinite alternate; display: block; line-height: 1; transition: transform 0.15s; }
@keyframes noteBounce { from { transform: scale(1) rotate(-8deg); } to { transform: scale(1.2) rotate(8deg); } }
#songNote:active { transform: scale(0.8) !important; }
#songLabel { font-size: clamp(10px, 1.5vw, 13px); color: #fff; font-family: 'Courier New', monospace; text-shadow: 1px 1px 0 rgba(0,0,0,0.5); text-align: center; opacity: 0.9; }
@media (max-width: 480px) { .gifts-row { flex-direction: column; align-items: center; gap: 14px; } .gifts-text { align-items: center; text-align: center; } .bal-l3, .bal-l4, .bal-l5, .bal-r3, .bal-r4, .bal-r5 { display: none; } }
@media (max-height: 600px) { .title1, .title2 { margin-bottom: 8px; font-size: clamp(22px, 5vw, 50px); } #giftBox { font-size: clamp(50px, 14vw, 100px); } .scene2-content { gap: 6px; } .person-img { width: clamp(60px, 12vw, 100px); } }
</style>
</head>
<body>
<canvas id="balloonCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>
<div id="scene1" role="main" aria-label="Birthday surprise landing">
  <div class="title1">HABURDAY! 🥳</div>
  <div class="gift-wrapper" onclick="openGift()" role="button" tabindex="0" aria-label="Click to open gift" onkeydown="if(event.key==='Enter'||event.key===' ')openGift()">
    <div id="giftBox" aria-hidden="true">🎁</div>
    <div class="click-hint">Click to open!</div>
  </div>
</div>
<div id="scene2" aria-label="Birthday reveal" aria-hidden="true">
  <div class="scene2-content">
    <div class="title2">HABURDAY! CHEESEKA🥳</div>
    <img src="https://i.ibb.co/CS39dcn/cheesekaimg.jpg" alt="Cheeseka" class="person-img" loading="eager" decoding="async">
    <div class="gifts-row">
      <div class="meme-box">
        <img src="https://i.ibb.co/MxTM2rRF/giphy.gif" alt="dancing cat" class="meme-gif">
      </div>
      <div class="gifts-text">
        <div class="gift-line1">Trip to South<br>KOREA🎟️ 😹</div>
        <div class="gift-line2">1,000,000</div>
        <div class="gift-line3">worth of balloons🤣</div>
      </div>
      <div class="meme-box">
        <img src="https://i.ibb.co/zTpqWLK4/cat2.png" alt="cat meme 2" class="meme-img" loading="lazy" decoding="async">
        <span id="songNote" onclick="nextSong()" title="Next song" aria-label="Play next song">🎵</span>
        <span id="songLabel">0420</span>
      </div>
    </div>
    <div class="username-tag">@jbaconroblox</div>
  </div>
</div>
<script>
(function () {
  'use strict';
  const confettiCanvas = document.getElementById('confettiCanvas');
  const cCtx = confettiCanvas.getContext('2d');
  const balloonCanvas = document.getElementById('balloonCanvas');
  const bCtx = balloonCanvas.getContext('2d');
  let confettiPieces = [], balloons = [];
  let balloonActive = false, confettiActive = false, opened = false;
  const SONGS = [
    { name: 'sundown',  src: 'sundown.mp3'  },
    { name: 'youngstunna', src: 'youngstunna.mp3' },
    { name: 'spaghetti', src: 'spaghetti.mp3' },
  ];
  let currentSong = 0, player = null;
  function loadSong(index, autoplay) {
    if (player) { player.pause(); player.src = ''; }
    currentSong = (index + SONGS.length) % SONGS.length;
    player = new Audio(SONGS[currentSong].src);
    player.volume = 0.75;
    player.loop = false;
    player.onended = () => loadSong(currentSong + 1, true);
    const label = document.getElementById('songLabel');
    if (label) label.textContent = SONGS[currentSong].name;
    if (autoplay) player.play().catch(() => {});
  }
  window.nextSong = function () {
    const note = document.getElementById('songNote');
    if (note) { note.style.animation = 'none'; note.style.transform = 'scale(0.75)'; setTimeout(() => { note.style.transform = ''; note.style.animation = ''; }, 200); }
    loadSong(currentSong + 1, true);
  };
  function resize() { confettiCanvas.width = balloonCanvas.width = window.innerWidth; confettiCanvas.height = balloonCanvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize, { passive: true });
  const CONFETTI_COLORS = ['#FFF5A0','#FF6B9D','#C44DFF','#44DDFF','#FF8C42','#7BFF6A','#FFD700','#FF4444','#44FFBB'];
  const BALLOON_COLORS  = ['#FF4444','#FF88BB','#FF6EC7','#FF9944','#FFDD44','#BB44FF','#44BBFF','#44FF88'];
  function rand(min, max) { return Math.random() * (max - min) + min; }
  function randItem(arr)  { return arr[Math.floor(Math.random() * arr.length)]; }
  function spawnConfetti() {
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    for (let i = 0; i < 220; i++) {
      confettiPieces.push({ x: cx + rand(-50,50), y: cy, vx: rand(-9,9), vy: rand(-18,-4), color: randItem(CONFETTI_COLORS), size: rand(5,15), rot: rand(0,360), rotV: rand(-12,12), shape: Math.random()>0.5?'rect':'circle', alpha: 1, gravity: 0.45 });
    }
    confettiActive = true;
  }
  function spawnBalloons() {
    balloonActive = true;
    setInterval(() => {
      if (!balloonActive) return;
      balloons.push({ x: rand(0,window.innerWidth), y: window.innerHeight+60, vy: rand(-3,-1.2), vx: rand(-0.4,0.4), r: rand(22,42), color: randItem(BALLOON_COLORS), sway: rand(0,Math.PI*2), swaySpeed: rand(0.01,0.04), alpha: 1 });
    }, 300);
  }
  function drawBalloon(b) {
    bCtx.save(); bCtx.globalAlpha = b.alpha;
    bCtx.beginPath(); bCtx.ellipse(b.x, b.y, b.r*0.85, b.r, 0, 0, Math.PI*2); bCtx.fillStyle = b.color; bCtx.fill();
    bCtx.beginPath(); bCtx.ellipse(b.x-b.r*0.22, b.y-b.r*0.3, b.r*0.18, b.r*0.25, -0.4, 0, Math.PI*2); bCtx.fillStyle = 'rgba(255,255,255,0.35)'; bCtx.fill();
    bCtx.beginPath(); bCtx.moveTo(b.x, b.y+b.r);
    const cx = b.x + Math.sin(b.sway*4)*12;
    bCtx.quadraticCurveTo(cx, b.y+b.r+20, b.x+Math.sin(b.sway*2)*8, b.y+b.r+50);
    bCtx.strokeStyle = 'rgba(80,40,80,0.6)'; bCtx.lineWidth = 1; bCtx.stroke(); bCtx.restore();
  }
  function loop() {
    cCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    bCtx.clearRect(0,0,balloonCanvas.width,balloonCanvas.height);
    if (confettiActive) {
      for (let i = confettiPieces.length-1; i >= 0; i--) {
        const p = confettiPieces[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.99; p.rot+=p.rotV; p.alpha-=0.006;
        if (p.alpha<=0) { confettiPieces.splice(i,1); continue; }
        cCtx.save(); cCtx.globalAlpha=Math.max(0,p.alpha); cCtx.translate(p.x,p.y); cCtx.rotate(p.rot*Math.PI/180); cCtx.fillStyle=p.color;
        if (p.shape==='rect') { cCtx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2); } else { cCtx.beginPath(); cCtx.arc(0,0,p.size/2,0,Math.PI*2); cCtx.fill(); }
        cCtx.restore();
      }
      if (confettiPieces.length===0) confettiActive=false;
    }
    if (balloonActive) {
      for (let i = balloons.length-1; i >= 0; i--) {
        const b = balloons[i];
        b.sway+=b.swaySpeed; b.x+=b.vx+Math.sin(b.sway)*0.5; b.y+=b.vy;
        if (b.y<-100) { balloons.splice(i,1); continue; }
        drawBalloon(b);
      }
    }
    requestAnimationFrame(loop);
  }
  loop();
  window.openGift = function () {
    if (opened) return; opened = true;
    const gift = document.getElementById('giftBox');
    gift.classList.add('exploding');
    gift.closest('.gift-wrapper').style.pointerEvents = 'none';
    try { const pop = new Audio('popbox.mp3'); pop.volume=1.0; pop.play().catch(()=>{}); } catch(e) {}
    setTimeout(() => { loadSong(0, true); }, 400);
    spawnConfetti();
    setTimeout(() => {
      const s1=document.getElementById('scene1'), s2=document.getElementById('scene2');
      s1.classList.add('hidden'); s1.setAttribute('aria-hidden','true');
      s2.classList.add('active'); s2.setAttribute('aria-hidden','false');
      spawnBalloons();
    }, 700);
  };
}());
</script>
</body>
</html>
